name: Deploy PR Preview to GitHub Pages
on:
  pull_request:
    paths-ignore:
      - 'firebase/**'
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache packages
        uses: actions/cache@v3
        with:
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          path: node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: cp dist/spa/index.html dist/spa/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/spa

  deploy:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.action != 'closed' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages-pr
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy PR preview to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          preview: true
